name: Tests

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  sanitizer-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sanitizer unit tests
        run: python3 test_sanitizer.py

      - name: Run sanitizer completeness audit
        run: python3 test_sanitizer_audit.py

      - name: Run benchmark regression tests
        run: python3 test_benchmarks.py

      - name: Compile all Python files
        run: python3 -m py_compile cover_generator.py run_benchmarks.py classifier_validation.py llm_backend.py dataset.py

      - name: Run sanitizer fuzz test (1000 rounds, <=5% leak threshold)
        run: |
          python3 test_sanitizer_fuzz.py --rounds 1000
          # Fuzz test exits non-zero if leak rate > 5% (FAIL verdict)
          # MARGINAL (1-5%) is acceptable; FAIL blocks the build

      - name: Check run_all.sh syntax
        run: bash -n run_all.sh

  classifier-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install classifier dependencies
        # ML stack only — torch, transformers, scikit, numpy, datasets.
        # No need for the LLM SDKs in this job.
        run: pip install -r requirements-ml.txt

      - name: Generate classifier data and train
        run: python3 classifier_validation.py run --n-sets 500 --epochs 5

  v2-domain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run v2 domain profile tests
        # v2 production guards only; defi_* variants belong to Part 3 (excluded from v2 CI)
        run: |
          set -e
          fail=0
          for d in domains/*/test_profile.py domains/*/test_analyzer.py; do
            dom=$(dirname "$d" | xargs basename)
            case "$dom" in
              defi|defi_*|_template|_feedback)
                echo "::group::SKIP $dom (Part 3 variant or non-domain)"; echo "::endgroup::"; continue;;
            esac
            echo "::group::TEST $dom"
            if ! python3 "$d"; then
              echo "::error file=$d::Test failed for $dom"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Run validation engine on all v2 production profiles
        run: |
          set -e
          fail=0
          for d in domains/*/profile.json; do
            dom=$(dirname "$d" | xargs basename)
            case "$dom" in
              defi|defi_*|_template|_feedback)
                continue;;
            esac
            echo "::group::VALIDATE $dom"
            if ! python3 -m meta.tx_validation_engine "$d"; then
              echo "::error file=$d::Validation failed for $dom"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Validation engine fail-gate test (CI must reject FAIL profiles)
        # Per Codex critical review: validation CLI must exit non-zero on
        # Overall: FAIL. _template/profile.json has only 1 heuristic and
        # F4_confidence_calibration produces FAIL — perfect failing fixture.
        # If this step succeeds, CI is silently passing FAIL profiles.
        run: |
          if python3 -m meta.tx_validation_engine domains/_template/profile.json >/dev/null 2>&1; then
            echo "::error::Validation engine should have exited non-zero on _template profile (Overall: FAIL)"
            exit 1
          fi
          echo "OK: validation CLI correctly exits non-zero on FAIL profile."

      - name: README quickstart smoke test
        # Per Codex Phase 3 review #2: the prior step name promised more
        # than it delivered. Now actually exercises the README quickstart:
        # install via the advertised aggregate file, run the advertised
        # demos, and validate the advertised loops.
        run: |
          set -e
          pip install -r requirements.txt
          # Tests + validation loops (exclude defi_* / _* support dirs).
          for d in domains/*/test_profile.py domains/*/test_analyzer.py; do
            case "$(dirname "$d" | xargs basename)" in
              defi|defi_*|_template|_feedback) continue;;
            esac
            python3 "$d" || exit 1
          done
          for d in domains/*/profile.json; do
            case "$(dirname "$d" | xargs basename)" in
              defi|defi_*|_template|_feedback) continue;;
            esac
            python3 -m meta.tx_validation_engine "$d" || exit 1
          done
          # Per-domain demo smoke — advertised in README "Run a per-domain
          # demo" block. Each demo must exit 0 (LLM may be in degraded
          # mode in CI; that's fine, the demo itself must not crash).
          # Phase 5D: per-demo timeout so a stuck I/O or hung Ollama
          # connect can't deadlock the entire smoke step (Codex Phase 4
          # review #8). 60s should comfortably cover any healthy demo
          # (degraded LLM has a 5s connect; healthy LLM has a 120s call
          # timeout but demos make at most a couple of calls).
          for d in examples/per_domain/*/demo.py; do
            dom_name=$(dirname "$d" | xargs basename)
            echo "::group::demo $dom_name"
            if ! timeout 60 python3 "$d"; then
              echo "::error::demo $d failed or timed out (>60s)"
              exit 1
            fi
            echo "::endgroup::"
          done
          # L2 monitor demo (advertised quickstart entry).
          if [ -f examples/l2_monitor/guard.py ]; then
            echo "::group::demo l2_monitor"
            if ! timeout 60 python3 examples/l2_monitor/guard.py; then
              echo "::error::l2_monitor demo failed or timed out (>60s)"
              exit 1
            fi
            echo "::endgroup::"
          fi

      - name: Documentation drift linter
        # Per Codex critical review: prevent regressions on
        # production-vs-prototype wording, count drift (15 vs 16),
        # and broken internal links to AI_PS-only paths.
        run: python3 scripts/lint_docs.py

      - name: Documentation drift linter — unit tests
        # Codex Phase 4 review missed-coverage: lint_docs.py rules can
        # become too broad or too permissive without anyone noticing
        # because the linter is only run against current repo contents.
        # Synthetic-fixture unit tests guard against pattern drift.
        run: python3 tests/test_lint_docs.py

      - name: "Workflow shell-syntax check (bash -n on every run block)"
        # Codex Phase 4 review #1 caught an orphan `else/fi` that
        # yaml.safe_load accepted but bash rejected. CI couldn't catch
        # it because no step was running bash -n. This step does.
        run: python3 scripts/check_workflow_shell.py

  v2-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        # base = httpx only; sufficient for proxy + wallet + AI-agent demo +
        # all v2 domain tests. Skips ML/LLM extras to keep this job fast.
        run: pip install -r requirements-base.txt

      - name: RPC proxy unit tests (CORS, batch, body-cap, state-pruning, dry-run)
        run: python3 -m unittest tests.test_rpc_proxy -v

      - name: Wallet EIP-1193 ABI-decoding tests
        run: python3 tests/test_wallet_eip1193.py

      - name: lint_docs.py unit tests
        # Phase 5C — Codex Phase 4 review missed-coverage: pin pattern
        # behavior so future edits can't silently broaden / narrow R1/R2/R3.
        run: python3 tests/test_lint_docs.py

      - name: AI-agent adapter unit tests
        # Codex Phase 3 review missed-coverage #9: the AI-agent CI gate
        # is otherwise just stdout grep. These tests pin the
        # _build_tool_intent contract: approve_token builds correct
        # ERC-20 calldata, check_balance emits eth_getBalance (not
        # eth_call), and other tool routes go to the right RPC method.
        run: python3 tests/test_ai_agent_adapter.py

      - name: Workflow shell-extractor unit tests
        # Phase 6E (Codex Phase 5 review #7): the regex fallback used to
        # silently miss inline run: commands. Pin both block and inline
        # extraction shapes so future edits can't regress.
        run: python3 -m unittest tests.test_check_workflow_shell -v

      - name: AI-agent demo emits expected warnings
        # Per Codex critical review (additional finding D): the demo's
        # advertised risky scenarios MUST emit warnings. Was previously
        # silent; this gate prevents regression.
        run: |
          out=$(python3 examples/ai_agent/guard.py)
          echo "$out"
          echo "$out" | grep -q "WARNING for approve_token" || { echo "::error::approve_token did not warn"; exit 1; }
          echo "$out" | grep -q "WARNING for check_balance" || { echo "::error::check_balance did not warn"; exit 1; }
          echo "$out" | grep -q "Loaded 16 profiles" || { echo "::error::AI agent loaded wrong profile count"; exit 1; }

      - name: Set up Node 20
        # Phase 7D (Codex Phase 6 review #4): setup-node MUST run before
        # any test that depends on `node`. Otherwise the
        # @skipUnless(shutil.which("node")) decorator on
        # test_dapp_frontend_guard.py silently skips the suite on runners
        # without ambient Node, leaving the gate weaker than claimed.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: DApp frontend guard smoke test
        # Phase 6H (Codex Phase 5 review #4): README advertised
        # examples/dapp_frontend/guard.js as a tested integration
        # surface, but no CI step exercised it. Smoke-runs the demo and
        # asserts on each scenario's expected alerts. Now placed AFTER
        # setup-node so node is guaranteed on PATH (Phase 7D).
        run: python3 tests/test_dapp_frontend_guard.py

      - name: Wallet EIP-1193 TypeScript parse
        # Per Codex Phase 3 review #1: the prior gate was non-gating
        # (||echo). Real failure mode now: node --experimental-strip-types
        # and the import must succeed or the job fails.
        run: |
          node --version
          node --experimental-strip-types --no-warnings -e "import('./examples/wallet_eip1193/guard.ts').then(()=>console.log('parse OK')).catch((e)=>{console.error(e); process.exit(1);})"

      - name: Wallet guard.ts execution golden tests
        # Codex Phase 3 review missed-coverage #1 + #2: actually run the
        # TS code (not just parse it) and assert on alert shape, including
        # the Phase 4B regression that setApprovalForAll(false) emits the
        # low-severity revoke alert and NOT the high-severity grant alert.
        run: node --experimental-strip-types --no-warnings tests/test_wallet_guard_ts.mjs

      - name: Kohaku integration typecheck (npm run typecheck)
        # Per Codex Phase 3 review #3: kohaku_integration is one of the
        # advertised integration surfaces but its package's tsc was
        # broken (rootDir/include mismatch). Now fixed; CI must keep
        # it that way. Use `npm ci` strictly — a lockfile drift should
        # fail CI rather than silently switching to `npm install`
        # (Codex Phase 4 review #1).
        run: |
          cd examples/kohaku_integration
          npm ci
          npm run typecheck
